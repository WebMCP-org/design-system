packages:
  - packages/*

catalogMode: prefer

catalog:
  "@base-ui/react": ~1.6.0
  "@changesets/cli": 2.31.0
  "@cloudflare/vite-plugin": ^1.42.4
  "@cloudflare/workers-types": ^4.20260630.1
  "@storybook/addon-a11y": ^10.4.6
  "@storybook/addon-docs": ^10.4.6
  "@storybook/addon-vitest": ^10.4.6
  "@storybook/react": ^10.4.6
  "@storybook/react-vite": ^10.4.6
  "@types/node": ^24
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@vitest/browser-playwright": ^4.1.9
  "@vitest/coverage-v8": ^4.1.9
  "@vitest/mocker": ^4.1.9
  anser: ^2.3.5
  playwright: ^1.61.0
  publint: 0.3.20
  react: ^19.2.7
  react-dom: ^19.2.7
  shiki: ^4.2.0
  storybook: ^10.4.6
  typescript: ^6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@0.2.1
  vite-plus: 0.2.1
  vitest: ^4.1.9
  wrangler: ^4.106.0

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
  ignoreMissing:
    - "@emnapi/core"
    - "@emnapi/runtime"

allowBuilds:
  esbuild: true
