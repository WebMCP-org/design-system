  vite-plus: 0.2.1
  vitest: ^4.1.9
  wrangler: ^4.106.0

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
  ignoreMissing:
    - "@emnapi/core"
    - "@emnapi/runtime"

allowBuilds:
  esbuild: true

supportedArchitectures:
  os:
    - current
    - linux
  cpu:
    - current
    - x64
  libc:
    - current
    - glibc
