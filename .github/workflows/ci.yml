name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
  schedule:
    - cron: "19 15 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify / Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "22"
          - "24"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Check
        run: vp check

      - name: Test
        env:
          CI: "true"
        run: vp test

      - name: Audit design tokens
        run: vp run audit:tokens

      - name: Audit Modern Web Guidance
        run: vp run audit:modern-web-guidance

      - name: Build packages
        run: vp run -r build

  package-and-storybook:
    name: Package and Storybook
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Test Storybook
        run: vp run test:storybook

      - name: Validate packages
        run: vp run validate:packages

      - name: Check Storybook deploy
        run: vp run check:storybook-deploy
